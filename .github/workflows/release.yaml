name: PR Changeset

# Gera um changeset e realiza o release completo (versionamento, npm publish,
# tag/release no GitHub e PR de release) quando um PR com label de release
# é mergeado na main.

on:
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: pr-changeset-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  context:
    name: Determine PR Type
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    outputs:
      is_release_pr: ${{ steps.check.outputs.is_release_pr }}
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check labels
        id: check
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          SHOULD_RUN=false
          IS_RELEASE_PR=false

          if echo ",$LABELS," | grep -Eq ',(release major|release minor|release patch),'; then
            SHOULD_RUN=true
          fi

          if echo ",$LABELS," | grep -q ',changeset-release,'; then
            IS_RELEASE_PR=true
            SHOULD_RUN=true
          fi

          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "is_release_pr=$IS_RELEASE_PR" >> "$GITHUB_OUTPUT"

  pre-release:
    name: Test & Build
    needs: context
    runs-on: ubuntu-latest
    if: needs.context.outputs.should_run == 'true'
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present

      - name: Build
        run: npm run build --if-present

  changeset:
    name: Create/Update Changeset
    needs: [context, pre-release]
    runs-on: ubuntu-latest
    if: needs.context.outputs.should_run == 'true'
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Generate changeset file
        if: needs.context.outputs.is_release_pr != 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          case ",$LABELS," in
            *,"release major",*) BUMP=major ;;
            *,"release minor",*) BUMP=minor ;;
            *,"release patch",*) BUMP=patch ;;
          esac

          PKG_NAME=$(node -p "require('./package.json').name")
          FILE=".changeset/pr-${PR_NUMBER}.md"
          mkdir -p .changeset

          {
            echo "---"
            echo "\"${PKG_NAME}\": ${BUMP}"
            echo "---"
            echo ""
            echo "${PR_TITLE}"
            [ -n "$PR_BODY" ] && printf '\n%s\n' "$PR_BODY"
          } > "$FILE"

          echo "Gerado $FILE (bump: $BUMP)"

      - name: Upload changeset artifact
        if: needs.context.outputs.is_release_pr != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: changeset-file
          path: .changeset/pr-*.md
          retention-days: 1
          if-no-files-found: ignore

  release:
    name: Release
    needs: [context, changeset]
    runs-on: ubuntu-latest
    if: needs.context.outputs.should_run == 'true'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: npm install

      - name: Download changeset artifact
        if: needs.context.outputs.is_release_pr != 'true'
        uses: actions/download-artifact@v4
        with:
          name: changeset-file
          path: .changeset

      - name: Get pending release version
        if: needs.context.outputs.is_release_pr != 'true'
        id: version_info
        run: |
          npx changeset status --output=release.json
          VERSION=$(node -p "require('./release.json').releases[0]?.newVersion || ''")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          title: "Release ${{ steps.version_info.outputs.version }} version"
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Label release PR
        if: steps.changesets.outputs.pullRequestNumber != '' && steps.changesets.outputs.published != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "changeset-release" --color "0e8a16" --description "Auto-generated release PR" --force
          gh pr edit "${{ steps.changesets.outputs.pullRequestNumber }}" --add-label "changeset-release"

      - name: Log publish result
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Published packages:"
          echo '${{ steps.changesets.outputs.publishedPackages }}'

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGES='${{ steps.changesets.outputs.publishedPackages }}'
          VERSION=$(echo "$PACKAGES" | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d)[0].version))")
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes
