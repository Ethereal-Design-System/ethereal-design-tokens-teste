name: PR Changeset

# Gera um changeset e realiza o release completo (versionamento, npm publish,
# tag/release no GitHub e PR de release) quando um PR com label de release
# é mergeado na main.

on:
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: pr-changeset-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  pre-release:
    name: Test & Build
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true &&
      (
        contains(github.event.pull_request.labels.*.name, 'release major') ||
        contains(github.event.pull_request.labels.*.name, 'release minor') ||
        contains(github.event.pull_request.labels.*.name, 'release patch')
      )
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test --if-present

      - name: Build
        run: npm run build --if-present

  changeset:
    name: Create/Update Changeset
    needs: pre-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Generate changeset file
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          case ",$LABELS," in
            *,"release major",*) BUMP=major ;;
            *,"release minor",*) BUMP=minor ;;
            *,"release patch",*) BUMP=patch ;;
          esac

          PKG_NAME=$(node -p "require('./package.json').name")
          FILE=".changeset/pr-${PR_NUMBER}.md"
          mkdir -p .changeset

          {
            echo "---"
            echo "\"${PKG_NAME}\": ${BUMP}"
            echo "---"
            echo ""
            echo "${PR_TITLE}"
            [ -n "$PR_BODY" ] && printf '\n%s\n' "$PR_BODY"
          } > "$FILE"

          echo "Gerado $FILE (bump: $BUMP)"

      - name: Upload changeset artifact
        uses: actions/upload-artifact@v4
        with:
          name: changeset-file
          path: .changeset/pr-*.md
          retention-days: 1

  release:
    name: Release
    needs: changeset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.BOT_GITHUB_TOKEN_TEST }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download changeset artifact
        uses: actions/download-artifact@v4
        with:
          name: changeset-file
          path: .changeset

      - name: Apply version bump (changeset version)
        run: npx changeset version

      - name: Read new version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          NOTES=$(awk "/^## ${{ steps.pkg.outputs.version }}/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$NOTES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        env:
          VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/v${VERSION}"
          git add .
          git commit -m "chore: release v${VERSION}"
          git push origin "release/v${VERSION}"

      - name: Open release PR
        id: release_pr
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN_TEST }}
          VERSION: ${{ steps.pkg.outputs.version }}
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "release/v${VERSION}" \
            --title "Release ${VERSION} version" \
            --body "${NOTES}")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Merge release PR
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN_TEST }}
        run: |
          gh pr merge "${{ steps.release_pr.outputs.pr_url }}" --merge --admin

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx changeset publish

      - name: Push git tag created by changeset publish
        run: git push --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN_TEST }}
          VERSION: ${{ steps.pkg.outputs.version }}
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "${NOTES}"