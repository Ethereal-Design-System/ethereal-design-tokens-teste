name: PR Changeset

# Gera um changeset automaticamente quando um PR com label de release é
# mergeado na main, usando label, título e descrição do PR.

on:
  pull_request:
    types: [closed]
    branches:
      - main

concurrency:
  group: pr-changeset-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  changeset:
    name: Create Changeset on Merge
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.merged == true &&
      (
        contains(github.event.pull_request.labels.*.name, 'release major') ||
        contains(github.event.pull_request.labels.*.name, 'release minor') ||
        contains(github.event.pull_request.labels.*.name, 'release patch')
      )
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.BOT_GITHUB_TOKEN_TEST }}

      - name: Generate changeset file
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          case ",$LABELS," in
            *,"release major",*) BUMP=major ;;
            *,"release minor",*) BUMP=minor ;;
            *,"release patch",*) BUMP=patch ;;
          esac

          PKG_NAME=$(node -p "require('./package.json').name")
          FILE=".changeset/pr-${PR_NUMBER}.md"
          mkdir -p .changeset

          {
            echo "---"
            echo "\"${PKG_NAME}\": ${BUMP}"
            echo "---"
            echo ""
            echo "${PR_TITLE}"
            [ -n "$PR_BODY" ] && printf '\n%s\n' "$PR_BODY"
          } > "$FILE"

          echo "Gerado $FILE (bump: $BUMP)"

      - name: Commit changeset
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ".changeset/pr-${PR_NUMBER}.md"
          git diff --cached --quiet && exit 0
          git commit -m "chore: add changeset for PR #${PR_NUMBER}"
          git push origin main